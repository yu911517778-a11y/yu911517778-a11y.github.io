<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="x-compat-upgrade" content="client-lite-v026-to-v029" />
    <meta http-equiv="refresh" content="0; url=client-lite-v029.html" />
    <title>AI短剧生产主控入口升级中</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101111;
        --panel: #181917;
        --ink: #f4f1e8;
        --muted: #b9b5aa;
        --line: rgba(244, 241, 232, .16);
        --accent: #9cff38;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(120, 140, 93, .12), transparent 42%),
          var(--bg);
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }

      main {
        width: min(100%, 520px);
        display: grid;
        gap: 18px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 25, 23, .92);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 7vw, 42px);
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      a {
        min-height: 46px;
        display: inline-grid;
        place-items: center;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        text-decoration: none;
        font-weight: 800;
      }

      a.primary {
        border-color: transparent;
        background: var(--accent);
        color: #101111;
      }

      @media (max-width: 520px) {
        .actions { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <p>Legacy Entry</p>
      <h1>入口已升级到 V0.29</h1>
      <p>旧极速链接会自动跳到新版客户入口。新版包含社交分享预览、正式部署路线图、项目页主入口、完整备用入口和临时兜底页。</p>
      <div class="actions">
        <a class="primary" href="client-lite-v029.html">打开新版极速入口</a>
        <a href="client-entry-v027.html">打开完整入口</a>
      </div>
    </main>
    <script>
      window.location.replace("client-lite-v029.html");
    </script>
  </body>
</html>
